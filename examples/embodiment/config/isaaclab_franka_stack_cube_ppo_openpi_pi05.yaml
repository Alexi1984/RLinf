# 中文学习注释：IsaacLab Franka Stack-Cube + OpenPI π0.5 的顶层 PPO 训练配置。
# 这里负责把环境、模型、FSDP、rollout、算法参数组合起来；正式训练前通常只复制一份 local 配置再改路径/显存相关参数。
defaults:  # 中文学习注释：Hydra 组合入口；这里把环境、模型、FSDP、权重同步等子配置合成一个完整训练配置。
  - env/isaaclab_stack_cube@env.train  # 中文学习注释：把同一个 IsaacLab stack-cube 环境模板挂载到训练环境配置。
  - env/isaaclab_stack_cube@env.eval  # 中文学习注释：把同一个环境模板挂载到评估环境配置，后续 eval 字段会覆盖并行数和视频选项。
  - model/pi0_5@actor.model  # 中文学习注释：加载 OpenPI π0.5 基础模型配置，并放到 actor.model 节点下。
  - training_backend/fsdp@actor.fsdp_config  # 中文学习注释：加载 FSDP 后端配置，用于 actor 的分布式/显存管理。
  - weight_syncer/patch_syncer@weight_syncer  # 中文学习注释：加载 actor 到 rollout 的参数同步方式。
  - override hydra/job_logging: stdout

hydra:  # 中文学习注释：Hydra 自身行为配置，控制运行目录、日志和配置搜索路径。
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:  # 中文学习注释：RLinf 调度层配置，描述单机/多机以及 actor/env/rollout 组件如何放置。
  num_nodes: 1
  component_placement:
    actor,env,rollout: all  # 中文学习注释：单机时把 actor、环境、rollout 都放在当前节点；多机时可拆分放置。

runner:  # 中文学习注释：训练主循环和日志保存配置；决定训练多久、多久存 checkpoint、是否只评估。
  task_type: embodied  # 中文学习注释：告诉 runner 这是具身智能环境交互训练，而不是纯文本/数学 RL。
  logger:
    log_path: "../results"  # 中文学习注释：训练日志、TensorBoard、视频和 checkpoint 的根目录；正式跑前通常改成持久化路径。
    project_name: rlinf  # 中文学习注释：实验项目名，给 TensorBoard/W&B/SwanLab 等 logger 使用。
    experiment_name: "isaaclab_ppo_openpi_pi05"  # 中文学习注释：本实验名称，标识 IsaacLab + PPO + OpenPI π0.5。
    logger_backends: ["tensorboard"] # 中文学习注释：默认用 TensorBoard 记录训练指标；也可切换 wandb、swanlab。

  max_epochs: 1000  # 中文学习注释：最多训练的外层 epoch 数；每个 epoch 通常包含 rollout 采集和若干轮 PPO 更新。
  max_steps: -1  # 中文学习注释：按 step 截断训练的上限；-1 表示不按全局 step 提前停止。

  only_eval: False  # 中文学习注释：False 表示训练；True 时只跑评估流程，不更新模型。
  val_check_interval: -1  # 中文学习注释：训练中评估间隔；-1 表示训练期间不按间隔自动评估。
  save_interval: 100  # 中文学习注释：每隔多少 epoch 保存一次 checkpoint。

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:  # 中文学习注释：PPO/actor-critic 算法超参数，控制 rollout、优势估计、clip、value loss 和采样策略。
  normalize_advantages: True  # 中文学习注释：对优势函数做标准化，常用于稳定 PPO 更新尺度。
  kl_penalty: kl # 中文学习注释：KL 估计方式；用于约束新旧策略差异，避免 PPO 更新过猛。
  group_size: 1  # 中文学习注释：同一任务/状态分组采样数量；这里每组 1 条，不做组内比较。
  reward_coef: 1.0  # 中文学习注释：奖励缩放系数，不是折扣因子；gamma 才是回报折扣。
  rollout_epoch: 2  # 中文学习注释：每个训练 epoch 内采集多少轮 rollout 数据；采完后再用这些数据更新。
  eval_rollout_epoch: 1  # 中文学习注释：评估时采集多少轮 rollout。

  reward_type: chunk_level  # 中文学习注释：奖励按 action chunk 聚合；OpenPI 一次输出多步连续动作，RLinf 以 chunk 为训练记账单位。
  logprob_type: chunk_level  # 中文学习注释：logprob 按 action chunk 聚合，用于 PPO ratio。
  entropy_type: token_level  # 中文学习注释：熵奖励按 token/动作生成单元统计，用来衡量策略随机性。

  update_epoch: 3  # 中文学习注释：同一批 rollout 数据重复做几轮 PPO 更新；不会混入其它 epoch 的新 rollout。
  adv_type: gae  # 中文学习注释：优势估计方法为 GAE，结合 gamma 和 gae_lambda 平衡偏差/方差。
  loss_type: actor_critic  # 中文学习注释：使用 actor loss + value loss 的 PPO 风格训练。
  loss_agg_func: "token-mean"  # 中文学习注释：多 token/action 损失的聚合方式。
  kl_beta: 0.0  # 中文学习注释：KL 正则权重；0 表示当前配置不额外惩罚 KL。
  entropy_bonus: 0  # 中文学习注释：熵奖励权重；0 表示不额外鼓励探索随机性。
  clip_ratio_high: 0.2  # 中文学习注释：PPO ratio 上裁剪阈值，限制新策略概率比旧策略高太多。
  clip_ratio_low: 0.2  # 中文学习注释：PPO ratio 下裁剪阈值，限制新策略概率比旧策略低太多。
  clip_ratio_c: 3.0  # 中文学习注释：额外 ratio 裁剪/稳定项，避免极端样本主导更新。
  value_clip: 0.2  # 中文学习注释：value 预测裁剪范围，稳定 critic/value head 更新。
  huber_delta: 10.0  # 中文学习注释：Huber value loss 的转折点，小误差二次、大误差近似线性。

  gamma: 0.99  # 中文学习注释：回报折扣因子，决定未来奖励在当前价值估计中的权重。
  gae_lambda: 0.95  # 中文学习注释：GAE 平滑参数，越接近 1 越依赖长程回报。

  filter_rewards: False  # 中文学习注释：是否按 reward 上下界筛样本；False 表示所有 rollout 样本都参与训练。
  rewards_lower_bound: 0.1  # 中文学习注释：启用 filter_rewards 时的奖励下界。
  rewards_upper_bound: 0.9  # 中文学习注释：启用 filter_rewards 时的奖励上界。
  # params for generation
  sampling_params:  # 中文学习注释：RLinf 通用采样参数，主要服务 OpenVLA 等 token 生成式策略；当前 OpenPI flow 连续动作链路基本不靠这一组字段控制动作采样。
    do_sample: True  # 中文学习注释：通用采样开关；当前 OpenPI 分支不会用它决定 flow 动作是否采样，主要不适用于 OpenPI。
    temperature_train: 1.0  # 中文学习注释：训练 rollout 的 token 采样温度；当前 OpenPI 不通过该字段调动作随机性，动作随机性主要看 flow/noise 参数。
    temperature_eval: 0.6  # 中文学习注释：评估时 token 采样温度；当前 OpenPI flow 动作生成基本不适用。
    top_k: 50  # 中文学习注释：token 生成式策略的 top-k 截断；当前 OpenPI 连续动作 flow 没有词表候选，基本不适用。
    top_p: 1.0  # 中文学习注释：token 生成式策略的 nucleus sampling 阈值；当前 OpenPI 连续动作 flow 基本不适用。
    repetition_penalty: 1.0  # 中文学习注释：文本/token 重复惩罚；当前 OpenPI 输出连续动作而非文本，基本不适用。
    add_BOS: False  # 中文学习注释：是否添加 BOS token；当前 OpenPI 输入由 dataconfig/transform 组织，基本不适用。

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null  # 中文学习注释：最多新生成 token 数；OpenPI 这里通常不靠文本长度控制动作。
    max_length: 1024  # 中文学习注释：通用 token 序列长度上限，不是单个 token 的长度，也不是 action_horizon。
    min_length: 1  # 中文学习注释：通用生成最小长度。

env:  # 中文学习注释：环境 worker 配置；这里再细分 train/eval 两套 IsaacLab 并行环境参数。
  group_name: "EnvGroup"  # 中文学习注释：Ray/RLinf worker 组名称，用于日志和调度识别。

  train:
    total_num_envs: 128  # 中文学习注释：训练并行 IsaacLab 环境总数；24G 显存上通常需要显著降低。
    max_episode_steps: 450 # 中文学习注释：单条 episode 最长环境步数，超过就 truncation。
    max_steps_per_rollout_epoch: 450  # 中文学习注释：每轮 rollout 采集的最大环境步数，通常和 episode 长度对齐。
    use_fixed_reset_state_ids: True  # 中文学习注释：使用固定 reset 初始状态，便于训练/评估可复现。
    seed: 42  # 中文学习注释：随机种子，控制环境重置、采样等随机过程。

  eval:
    total_num_envs: 32  # 中文学习注释：评估并行环境总数；只在评估流程或训练中触发 eval 时使用。
    max_episode_steps: 450
    max_steps_per_rollout_epoch: 450  # 中文学习注释：每轮 rollout 采集的最大环境步数，通常和 episode 长度对齐。
    auto_reset: True  # 中文学习注释：评估时 episode 结束后自动重置环境。
    ignore_terminations: True  # 中文学习注释：忽略成功 termination 继续跑到固定长度，常用于统一长度评估和视频。
    use_fixed_reset_state_ids: True  # 中文学习注释：使用固定 reset 初始状态，便于训练/评估可复现。
    video_cfg:
      save_video: True  # 中文学习注释：评估时保存 rollout 视频。
      info_on_video: True  # 中文学习注释：在视频上叠加成功率、reward 等信息。
      video_base_dir: ${runner.logger.log_path}/video/eval  # 中文学习注释：评估视频保存目录。
    seed: 42  # 中文学习注释：随机种子，控制环境重置、采样等随机过程。

rollout:  # 中文学习注释：rollout worker 配置；负责用当前策略和环境交互，采集轨迹/动作/logprob/value。
  group_name: "RolloutGroup"  # 中文学习注释：rollout worker 组名称。
  backend: "huggingface"  # 中文学习注释：rollout 生成后端名称；OpenPI 适配仍复用该 worker 框架。
  enable_offload: True  # 中文学习注释：rollout 侧启用 offload，降低显存常驻压力。
  pipeline_stage_num: 1  # 中文学习注释：rollout/env 流水线 stage 数；1 表示不拆分多阶段并行流水线。

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"  # 中文学习注释：SFT 初始模型路径占位符；正式运行前需改成 RLinf-pi05-SFT-Stack-cube 真实路径。
    precision: ${actor.model.precision}  # 中文学习注释：rollout 模型精度继承 actor；OpenPI 通常保持 null，让 wrapper 自己处理 dtype。

actor:  # 中文学习注释：actor 训练 worker 配置；负责加载 OpenPI、计算 PPO loss，并更新模型参数。
  group_name: "ActorGroup"  # 中文学习注释：actor 训练 worker 组名称。
  training_backend: "fsdp"  # 中文学习注释：actor 训练后端，使用 FSDP 包装模型。
  micro_batch_size: 32  # 中文学习注释：单次前后向 micro batch；越大显存占用越高。
  global_batch_size: 256  # 中文学习注释：PPO 更新使用的总 batch，通常由多个 micro batch 累积得到。
  seed: 42
  enable_offload: False  # 中文学习注释：actor 侧是否启用 offload；False 表示参数/优化器更常驻 GPU/内存。

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"  # 中文学习注释：SFT 初始模型路径占位符；正式运行前需改成 RLinf-pi05-SFT-Stack-cube 真实路径。
    model_type: "openpi"  # 中文学习注释：选择 RLinf 的 OpenPI action model wrapper。
    action_dim: 7  # 中文学习注释：IsaacLab Franka 相对 IK 动作维度，通常为 6D 末端位姿增量 + 1D 夹爪。
    num_action_chunks: 5  # 中文学习注释：RLinf 每次从 OpenPI 输出动作序列中取前 5 步执行和记账。
    num_steps: 5  # 中文学习注释：OpenPI flow denoise/积分步数，越大推理更慢但可能更准。
    add_value_head: True  # 中文学习注释：给 actor 内部加 value head，使 actor 同时输出动作和 V(s)。
    openpi:
      config_name: "pi05_isaaclab_stack_cube"  # 中文学习注释：选择 OpenPI 里 IsaacLab stack-cube 的数据/归一化/动作配置。
      num_images_in_input: 2  # 中文学习注释：输入两路图像：table/base camera 与 wrist camera。
      noise_level: 0.5  # 中文学习注释：flow_sde 采样噪声强度，控制 rollout 时动作探索随机性。
      joint_logprob: False  # 中文学习注释：是否按 joint action 联合计算 logprob；False 表示使用当前 wrapper 默认分解方式。
      num_steps: ${actor.model.num_steps}
      value_after_vlm: True  # 中文学习注释：value head 接在 VLM/prefix 表示后，更偏状态/任务理解特征。
      value_vlm_mode: "mean_token"  # 中文学习注释：用 VLM token 平均表示作为 value 输入。
      detach_critic_input: True  # 中文学习注释：critic 输入 detach，避免 value loss 反传改动共享表征。

  optim:
    lr: 5.0e-6  # 中文学习注释：actor/policy 学习率。
    value_lr: 1.0e-4  # 中文学习注释：value head/critic 学习率，通常可高于 actor。
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0  # 中文学习注释：梯度裁剪阈值，避免梯度爆炸。
    weight_decay: 0.01
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"  # 中文学习注释：actor 模型使用 FSDP 包装。
    sharding_strategy: "no_shard"  # 中文学习注释：不切分参数，单卡/小规模调试常见；多卡大模型可改其它策略。
    gradient_checkpointing: False # 中文学习注释：OpenPI 当前不支持 gradient checkpointing，不要改。
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:  # 中文学习注释：奖励模型配置；IsaacLab 这里直接使用环境奖励，所以不启用额外 reward model。
  use_reward_model: False  # 中文学习注释：不使用额外奖励模型，直接使用 IsaacLab 环境奖励。

critic:  # 中文学习注释：独立 critic 配置；这里关闭独立 critic，value head 集成在 actor/OpenPI 模型内部。
  use_critic_model: False  # 中文学习注释：不启动独立 critic worker，value head 集成在 actor 模型里。
