# 中文学习注释：IsaacLab stack-cube 环境模板配置。
# 顶层训练配置会把这个模板分别挂到 env.train 和 env.eval，并覆盖并行环境数、episode 长度、视频选项等。
env_type: isaaclab  # 中文学习注释：告诉 RLinf EnvWorker 使用 IsaacLab 环境适配器。
total_num_envs: null  # 中文学习注释：环境模板里的占位值，顶层 train/eval 配置会覆盖真实并行数。
auto_reset: False  # 中文学习注释：训练模板默认不自动重置，由 runner/worker 控制 episode 边界。
ignore_terminations: False  # 中文学习注释：训练模板默认不忽略终止信号；eval 可覆盖为 True 做固定长度评估。
use_rel_reward: True  # 中文学习注释：使用相对/增量奖励形式，step reward 可反映任务进展。
seed: 0  # 中文学习注释：环境模板默认种子，顶层配置通常覆盖。
group_size: 1  # 中文学习注释：环境分组大小，和算法 group_size 对齐。

reward_coef: 1.0  # 中文学习注释：环境奖励缩放系数。
use_fixed_reset_state_ids: False  # 中文学习注释：是否固定 reset 状态；顶层 IsaacLab 实验会覆盖为 True。
max_steps_per_rollout_epoch: 256  # 中文学习注释：模板默认 rollout 步数上限。
max_episode_steps: 256 # 中文学习注释：模板默认 episode 截断长度。


video_cfg:  # 中文学习注释：视频保存配置，训练默认关闭，评估配置可覆盖开启。
  save_video: False  # 中文学习注释：训练时默认不保存视频，减少 IO 和存储压力。
  info_on_video: True  # 中文学习注释：保存视频时是否叠加 reward/success 等信息。
  fps: 20  # 中文学习注释：视频帧率。
  video_base_dir: ${runner.logger.log_path}/video/train  # 中文学习注释：训练视频默认目录。

init_params:  # 中文学习注释：传给 IsaacLab 任务构造器的底层参数。
  id: "Isaac-Stack-Cube-Franka-IK-Rel-Visuomotor-Rewarded-v0"  # 中文学习注释：注册到 IsaacLab/Gymnasium 的 stack-cube 任务 ID。
  num_envs: null  # 中文学习注释：实际并行环境数由 IsaaclabBaseEnv 在运行时写入。
  max_episode_steps: ${env.train.max_episode_steps} # max episode steps for truncation
  task_description: "Stack the red block on the blue block, then stack the green block on the red block."  # 中文学习注释：送给 OpenPI 的语言指令。
  table_cam:  # 中文学习注释：第三人称/table 相机在 IsaacLab 环境里渲染/输出的观测分辨率。
    height: 256  # 中文学习注释：环境输出图像高度；后续 OpenPI model transform 会再按视觉塔需要处理，通常不是最终 224 模型输入尺寸。
    width: 256  # 中文学习注释：环境输出图像宽度；这里要和 SFT 数据采集时的相机观测尺寸保持一致。
  wrist_cam:  # 中文学习注释：腕部相机在 IsaacLab 环境里渲染/输出的观测分辨率。
    height: 256  # 中文学习注释：环境输出图像高度；OpenPI policy 先接收该观测图像，后续模型级预处理再变到视觉塔输入尺寸。
    width: 256  # 中文学习注释：环境输出图像宽度；这里要和 SFT 数据采集时的腕部相机观测尺寸保持一致。
