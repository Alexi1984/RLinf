# 中文学习注释：OpenPI π0.5 模型基础配置模板。
# 具体任务 YAML 会覆盖 config_name、model_path、action chunk、value head 等字段。
model_type: "openpi"  # 中文学习注释：选择 RLinf 的 OpenPI 模型适配器。

# Model path - should be set in specific config files
model_path: "/path/to/model/openpi"  # 中文学习注释：基础模型路径占位符，具体实验 YAML 会覆盖。

precision: null # for openpi, precision is null, please do not change this value

# Action and chunk settings
num_action_chunks: 10  # 中文学习注释：默认每次从 OpenPI 动作序列中取多少步交给环境和 PPO 记账。
action_dim: 7  # 中文学习注释：环境动作维度，IsaacLab/Franka 常用 7 维控制。

# LoRA settings
is_lora: False  # 中文学习注释：是否启用 LoRA；小显存训练通常会考虑改 True。
lora_rank: 32  # 中文学习注释：LoRA rank，越大可训练容量越强但显存/计算更高。

# Training settings
use_proprio: True  # 中文学习注释：是否使用机器人本体状态输入。
num_steps: 5  # 中文学习注释：OpenPI flow matching denoise/积分步数。
add_value_head: False  # 中文学习注释：基础模板默认不加 value head，PPO 实验会覆盖为 True。

# openpi specific parameters
openpi:  # 中文学习注释：传入 OpenPI wrapper 的专用模型/采样/价值头配置。
  config_name: "pi05_libero"  # 中文学习注释：默认 pi0.5 LIBERO 配置；IsaacLab 实验会覆盖为 pi05_isaaclab_stack_cube。
  num_images_in_input: 2  # 中文学习注释：OpenPI 输入图像路数。
  noise_level: 0.5  # 中文学习注释：flow_sde 采样噪声强度，用于 rollout 探索。
  action_chunk: ${actor.model.num_action_chunks}  # 中文学习注释：继承 RLinf 的动作 chunk 长度。
  num_steps: ${actor.model.num_steps}
  train_expert_only: True  # 中文学习注释：优先训练 action expert，减少对 VLM 主干的扰动。
  action_env_dim: ${actor.model.action_dim}  # 中文学习注释：环境实际动作维度。
  noise_method: "flow_sde"  # 中文学习注释：OpenPI rollout 的 flow 采样方式。
  add_value_head: ${actor.model.add_value_head}
  value_after_vlm: False  # 中文学习注释：基础模板默认从 action expert/suffix 特征估值；IsaacLab 可覆盖为 True。
  value_vlm_mode: "mean_token"  # 中文学习注释：value_after_vlm=True 时的 VLM token 聚合方式。
  detach_critic_input: null  # 中文学习注释：critic 输入是否 detach 的模板占位。

  # DSRL specific configurations (disabled by default)
  use_dsrl: False  # 中文学习注释：默认关闭 DSRL 辅助分支。
  dsrl_state_dim: 8
  dsrl_action_noise_dim: 32
  dsrl_num_q_heads: 10
  dsrl_agg_q: "mean"
  dsrl_image_latent_dim: 64
  dsrl_state_latent_dim: 64
  dsrl_hidden_dims: [128, 128, 128]
